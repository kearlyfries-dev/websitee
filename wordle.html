<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traildle 🥾 — Hiking Wordle</title>
  <style>
    /* ── Root & Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #538d4e;
      --yellow: #b59f3b;
      --gray:   #3a3a3c;
      --light:  #818384;
      --bg:     #121213;
      --tile-bg:#121213;
      --tile-border: #3a3a3c;
      --tile-border-active: #565758;
      --text:   #ffffff;
      --key-bg: #818384;
      --font: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 500px;
      border-bottom: 1px solid #3a3a3c;
      padding: 14px 0;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.75rem;
      color: var(--light);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    .back-link {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      color: var(--light);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0 8px;
    }
    .back-link:hover { color: #fff; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #000;
      padding: 10px 20px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-rows: repeat(6, 62px);
      grid-template-columns: repeat(5, 62px);
      gap: 5px;
      margin: 24px 0;
    }

    .tile {
      width: 62px;
      height: 62px;
      border: 2px solid var(--tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: border-color 0.1s;
      position: relative;
    }

    .tile.filled {
      border-color: var(--tile-border-active);
      animation: pop 0.1s ease;
    }

    .tile.revealed {
      animation: flip 0.5s ease forwards;
      border: none;
    }

    .tile[data-state="correct"]  { --reveal-bg: var(--green); }
    .tile[data-state="present"]  { --reveal-bg: var(--yellow); }
    .tile[data-state="absent"]   { --reveal-bg: var(--gray); }

    @keyframes flip {
      0%   { transform: rotateX(0deg); background: var(--tile-bg); }
      49%  { transform: rotateX(-90deg); background: var(--tile-bg); }
      50%  { transform: rotateX(-90deg); background: var(--reveal-bg); color: #fff; }
      100% { transform: rotateX(0deg);  background: var(--reveal-bg); color: #fff; }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80%      { transform: translateX(4px); }
    }

    .shake { animation: shake 0.5s ease; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40%      { transform: translateY(-20px); }
      60%      { transform: translateY(-10px); }
    }

    /* ── Keyboard ── */
    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 0 8px;
    }

    .kb-row {
      display: flex;
      gap: 6px;
    }

    .key {
      height: 58px;
      min-width: 43px;
      padding: 0 6px;
      border: none;
      border-radius: 4px;
      background: var(--key-bg);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s;
      font-family: inherit;
    }

    .key.wide { min-width: 65px; font-size: 0.75rem; }
    .key:active { filter: brightness(0.85); }

    .key[data-state="correct"] { background: var(--green); }
    .key[data-state="present"] { background: var(--yellow); }
    .key[data-state="absent"]  { background: var(--gray); }

    /* ── Restart Button ── */
    #restart-btn {
      margin: 24px 0;
      padding: 12px 30px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #restart-btn:hover { background: #6aaf64; }

    /* ── Theme hint at bottom ── */
    .theme-hint {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--light);
      text-align: center;
      letter-spacing: 0.05em;
    }

    @media (max-width: 400px) {
      #board { grid-template-rows: repeat(6, 52px); grid-template-columns: repeat(5, 52px); }
      .tile { width: 52px; height: 52px; font-size: 1.6rem; }
      .key { min-width: 32px; height: 50px; font-size: 0.7rem; }
      .key.wide { min-width: 48px; }
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="scratch.html">&#8592; Back</a>
  <h1>Traildle 🥾</h1>
  <p>Hiking-themed Wordle · Guess the 5-letter trail word</p>
</header>

<div id="toast"></div>

<div id="board"></div>

<p class="theme-hint">All words are hiking &amp; outdoors themed!</p>

<div id="keyboard">
  <div class="kb-row" id="row0"></div>
  <div class="kb-row" id="row1"></div>
  <div class="kb-row" id="row2"></div>
</div>

<button id="restart-btn" onclick="init()">Play Again</button>

<script>
  // ── Word List (hiking/outdoors themed) ──
  const WORDS = [
    "TRAIL","RIDGE","CREEK","CLIMB","BLAZE","SCOUT","STEEP","STONE",
    "BOOTS","BROOK","BRUSH","BEARS","CLIFF","GROVE","GUIDE","LODGE",
    "MARSH","MOUNT","NORTH","PATHS","PEAKS","RIVER","ROCKS","SLOPE",
    "SMITH","SNOWY","SPARE","STUMP","SWIFT","TALON","TENTS","THYME",
    "TRACK","TREAD","TREES","TROUT","VISTA","WATER","WINDS","WOODS",
    "STORM","CLOUD","FIELD","FERNS","FLINT","FROST","GRASS","GRAZE",
    "HAVEN","HAWKS","HEATH","HILLS","KNOLL","LAKES","LEAFY","LIGHT",
    "BLUFF","BASIN","ASPEN","BIRCH","CEDAR","CRANE","DELTA","DRIFT",
    "EAGLE","EBONY","EMBER","FLOCK","FLORA","FLUME","FORGE","FUNGI",
    "GLADE","GLARE","GLEAM","GLENS","GULCH","GULLY","HIKER","HUMID"
  ];

  const KEYBOARD_ROWS = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];

  const MAX_GUESSES = 6;
  const WORD_LEN = 5;

  let targetWord, currentRow, currentCol, gameOver, board, keyStates;

  function init() {
    targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
    currentRow = 0;
    currentCol = 0;
    gameOver = false;
    board = Array.from({length: MAX_GUESSES}, () => Array(WORD_LEN).fill(''));
    keyStates = {};

    buildBoard();
    buildKeyboard();
    document.getElementById('restart-btn').style.display = 'none';
  }

  function buildBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    for (let r = 0; r < MAX_GUESSES; r++) {
      for (let c = 0; c < WORD_LEN; c++) {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        tile.id = `tile-${r}-${c}`;
        el.appendChild(tile);
      }
    }
  }

  function buildKeyboard() {
    KEYBOARD_ROWS.forEach((keys, ri) => {
      const row = document.getElementById('row' + ri);
      row.innerHTML = '';
      keys.forEach(k => {
        const btn = document.createElement('button');
        btn.classList.add('key');
        btn.textContent = k;
        btn.dataset.key = k;
        if (k === 'ENTER' || k === '⌫') btn.classList.add('wide');
        btn.addEventListener('click', () => handleKey(k));
        row.appendChild(btn);
      });
    });
  }

  function getTile(r, c) {
    return document.getElementById(`tile-${r}-${c}`);
  }

  function showToast(msg, duration = 1400) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function handleKey(key) {
    if (gameOver) return;

    if (key === '⌫' || key === 'BACKSPACE') {
      deleteLetter();
    } else if (key === 'ENTER') {
      submitGuess();
    } else if (/^[A-Z]$/.test(key)) {
      addLetter(key);
    }
  }

  function addLetter(letter) {
    if (currentCol >= WORD_LEN) return;
    board[currentRow][currentCol] = letter;
    const tile = getTile(currentRow, currentCol);
    tile.textContent = letter;
    tile.classList.add('filled');
    currentCol++;
  }

  function deleteLetter() {
    if (currentCol <= 0) return;
    currentCol--;
    board[currentRow][currentCol] = '';
    const tile = getTile(currentRow, currentCol);
    tile.textContent = '';
    tile.classList.remove('filled');
  }

  function submitGuess() {
    if (currentCol < WORD_LEN) {
      shakeRow(currentRow);
      showToast('Not enough letters');
      return;
    }

    const guess = board[currentRow].join('');
    revealRow(currentRow, guess);
  }

  function revealRow(row, guess) {
    const result = evaluateGuess(guess);
    const delay = 300; // ms per tile flip

    result.forEach((state, c) => {
      const tile = getTile(row, c);
      setTimeout(() => {
        tile.dataset.state = state;
        tile.classList.add('revealed');
      }, c * delay);
    });

    setTimeout(() => {
      // Update key colors
      result.forEach((state, c) => {
        const letter = guess[c];
        const priority = { correct: 3, present: 2, absent: 1 };
        if ((priority[state] || 0) > (priority[keyStates[letter]] || 0)) {
          keyStates[letter] = state;
          const keyEl = document.querySelector(`.key[data-key="${letter}"]`);
          if (keyEl) keyEl.dataset.state = state;
        }
      });

      if (guess === targetWord) {
        const msgs = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
        showToast(msgs[row] || 'Nice!', 2500);
        bounceRow(row);
        gameOver = true;
        document.getElementById('restart-btn').style.display = 'inline-block';
      } else {
        currentRow++;
        currentCol = 0;
        if (currentRow >= MAX_GUESSES) {
          showToast(targetWord, 3500);
          gameOver = true;
          document.getElementById('restart-btn').style.display = 'inline-block';
        }
      }
    }, WORD_LEN * delay + 200);
  }

  function evaluateGuess(guess) {
    const result = Array(WORD_LEN).fill('absent');
    const targetArr = targetWord.split('');
    const guessArr = guess.split('');
    const used = Array(WORD_LEN).fill(false);

    // First pass: correct letters
    guessArr.forEach((l, i) => {
      if (l === targetArr[i]) {
        result[i] = 'correct';
        used[i] = true;
        targetArr[i] = null;
      }
    });

    // Second pass: present letters
    guessArr.forEach((l, i) => {
      if (result[i] === 'correct') return;
      const ti = targetArr.findIndex((t, idx) => t === l && !used[idx]);
      if (ti !== -1) {
        result[i] = 'present';
        used[ti] = true;
        targetArr[ti] = null;
      }
    });

    return result;
  }

  function shakeRow(row) {
    for (let c = 0; c < WORD_LEN; c++) {
      const tile = getTile(row, c);
      tile.classList.add('shake');
      tile.addEventListener('animationend', () => tile.classList.remove('shake'), { once: true });
    }
  }

  function bounceRow(row) {
    for (let c = 0; c < WORD_LEN; c++) {
      const tile = getTile(row, c);
      setTimeout(() => {
        tile.style.animation = 'bounce 0.5s ease';
        tile.addEventListener('animationend', () => tile.style.animation = '', { once: true });
      }, c * 100);
    }
  }

  // ── Keyboard Input ──
  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    if (e.key === 'Backspace') handleKey('BACKSPACE');
    else if (e.key === 'Enter') handleKey('ENTER');
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
  });

  init();
</script>
</body>
</html>
